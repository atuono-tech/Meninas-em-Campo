<!DOCTYPE html>
<!-- v2 -->
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Meninas em Campo · Publicações</title>
<style>
@font-face {
  font-family:"Pressio";
  src:url("Pressio_No__45_Black_Condensed.otf") format("opentype");
  font-weight:900
}
:root{
  --verde:#42ce02; --amarelo:#f3ce02; --laranja:#f44c06;
  --roxo:#c084fc;  --azul:#354d73;   --branco:#EEEEEE;
  --cinza-card:rgba(255,255,255,.04);
  --borda:rgba(255,255,255,.10);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:"Arial Narrow",Arial,sans-serif;
  background:var(--azul); color:var(--branco);
  min-height:100vh; overflow-x:hidden;
}
/* grid sutil de fundo */
body::after{
  content:""; position:fixed; inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px);
  background-size:40px 40px;
  pointer-events:none; z-index:0;
}

/* ── HEADER ── */
header{
  position:relative; z-index:10;
  max-width:1100px; margin:0 auto;
  padding:2.5rem 2.5rem 0;
}
.logo-bar{
  display:flex; align-items:center; justify-content:space-between;
  border-bottom:2px solid var(--verde);
  padding-bottom:1rem; margin-bottom:1.25rem;
  flex-wrap:wrap; gap:.75rem;
}
.logo-img{
  height:76px; width:auto; object-fit:contain;
  
}
.header-right{display:flex;flex-direction:column;align-items:stretch;gap:.4rem;}
.badge{
  font-family:"Pressio","Arial Narrow",Arial,sans-serif;
  font-size:1.05rem; letter-spacing:.18em; text-transform:uppercase;
  color:var(--amarelo); padding:.35rem .85rem;
  border:1.5px solid var(--amarelo); border-radius:2px;
  width:100%; text-align:center; white-space:nowrap;
  box-sizing:border-box;
}
.subtitle{
  font-size:.88rem; color:rgba(238,238,238,.90);
  letter-spacing:.02em; text-align:center;
}

/* ── SEARCH ── */
.search-wrap{
  position:relative; z-index:10;
  max-width:1100px; margin:0 auto;
  padding:.75rem 2.5rem 1.5rem;
}
.search-row{display:flex;gap:.6rem;position:relative;}
.search-icon{
  position:absolute;left:.85rem;top:50%;
  transform:translateY(-50%);
  color:rgba(238,238,238,.3);pointer-events:none;
}
.search-input{
  flex:1;
  background:rgba(255,255,255,.06);
  border:1.5px solid rgba(255,255,255,.12);
  border-radius:2px;
  padding:.65rem 1rem .65rem 2.75rem;
  color:var(--branco);
  font-family:"Arial Narrow",Arial,sans-serif;
  font-size:.9rem; outline:none;
  transition:border-color .2s;
}
.search-input::placeholder{color:rgba(238,238,238,.42);}
.search-input:focus{border-color:var(--verde);}
.search-count{
  font-size:.82rem;color:rgba(238,238,238,.75);
  align-self:center;white-space:nowrap;
}

/* ── MAIN GRID ── */
.main{
  position:relative;z-index:10;
  max-width:1100px;margin:0 auto;
  padding:0 2.5rem 5rem;
  display:flex;flex-direction:column;gap:2.75rem;
}

/* ── YEAR BLOCK ── */
.year-block{}
.year-header{
  display:flex;align-items:center;gap:.75rem;
  margin-bottom:1rem;
}
.year-pill{
  font-family:"Pressio","Arial Narrow",Arial,sans-serif;
  font-size:2.3rem;letter-spacing:.1em;
  padding:.25rem .85rem;
  border-radius:2px;
  white-space:nowrap;
}
.year-pill.y2025{
  background:#EEEEEE;
  border:1.5px solid #EEEEEE;
  color:var(--azul);
}
.year-pill.y2026{
  background:#EEEEEE;
  border:1.5px solid #EEEEEE;
  color:var(--azul);
}
.year-line{flex:1;height:1px;background:rgba(255,255,255,.08);}
.year-count{font-size:.78rem;color:rgba(238,238,238,.75);white-space:nowrap;}

/* ── 2 colunas ── */
.cols{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:1px;
  background:rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.07);
}
@media(max-width:640px){.cols{grid-template-columns:1fr;}}

/* ── SEÇÃO DE TURMAS ── */
.turmas-section{
  border:1px solid rgba(255,255,255,.07);
  background:rgba(255,255,255,.07);
  margin-top:1px;
}
.turmas-header{
  padding:1rem 1.25rem;
  background:rgba(0,0,0,.15);
  border-bottom:1px solid rgba(255,255,255,.06);
  display:flex;align-items:center;gap:.75rem;
}
.turmas-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:1px;
  background:rgba(255,255,255,.04);
}
@media(max-width:640px){.turmas-grid{grid-template-columns:repeat(2,1fr);}}

/* ── CHIP (card compacto de turma) ── */
.chip{
  display:flex;flex-direction:column;gap:.3rem;
  padding:1rem 1.25rem;
  background:rgba(255,255,255,.02);
  text-decoration:none;color:inherit;
  position:relative;overflow:hidden;
  transition:background .15s;
  min-height:90px;
  justify-content:center;
}
.chip::before{
  content:"";
  position:absolute;left:0;top:0;bottom:0;
  width:3px;background:var(--chip-accent,var(--verde));
  transition:width .18s;
}
.chip:hover{background:rgba(255,255,255,.06);}
.chip:hover::before{width:5px;}
.chip-cat{
  font-family:"Pressio","Arial Narrow",Arial,sans-serif;
  font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;
  color:var(--chip-accent,var(--verde));
}
.chip-label{
  font-family:"Pressio","Arial Narrow",Arial,sans-serif;
  font-size:1.1rem;font-weight:900;text-transform:uppercase;
  color:var(--branco);line-height:1.1;
}

/* ── SEÇÃO FOTOS ── */
.fotos-section{
  border:1px solid rgba(255,255,255,.07);
  border-top:none;
  background:rgba(255,255,255,.02);
}
.fotos-header{
  padding:.85rem 1.25rem;
  background:rgba(0,0,0,.10);
  border-bottom:1px solid rgba(255,255,255,.06);
  display:flex;align-items:center;gap:.75rem;
}
.fotos-icon{
  font-size:1rem;color:rgba(238,238,238,.5);
}
.fotos-title{
  font-family:"Pressio","Arial Narrow",Arial,sans-serif;
  font-size:1rem;letter-spacing:.08em;text-transform:uppercase;
  color:var(--branco);
}
.fotos-sub{
  font-size:.78rem;color:rgba(238,238,238,.55);margin-left:auto;
}
.fotos-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:1px;
  background:rgba(255,255,255,.04);
}
@media(max-width:640px){.fotos-grid{grid-template-columns:repeat(2,1fr);}}
.foto-mes{
  padding:.85rem 1rem;
  background:rgba(255,255,255,.02);
  display:flex;flex-direction:column;gap:.5rem;
}
.foto-mes-nome{
  font-family:"Pressio","Arial Narrow",Arial,sans-serif;
  font-size:.9rem;font-weight:900;text-transform:uppercase;
  color:var(--branco);letter-spacing:.05em;
}
.foto-links{
  display:flex;flex-direction:column;gap:4px;
}
.foto-link{
  display:inline-flex;align-items:center;gap:.4rem;
  font-size:.72rem;letter-spacing:.04em;
  color:var(--amarelo);text-decoration:none;
  border:1px solid rgba(243,206,2,.3);
  border-radius:2px;padding:.25rem .6rem;
  transition:background .15s,border-color .15s;
  width:fit-content;
}
.foto-link:hover{background:rgba(243,206,2,.12);border-color:rgba(243,206,2,.6);}
.foto-link svg{flex-shrink:0;opacity:.7;}


.col-header{
  padding:1.25rem 1.25rem;
  background:rgba(0,0,0,.15);
  border-bottom:1px solid rgba(255,255,255,.06);
  display:flex;align-items:center;gap:.75rem;
}
.col-pill{
  font-family:"Pressio","Arial Narrow",Arial,sans-serif;
  font-size:1.1rem;letter-spacing:.2em;text-transform:uppercase;
  padding:.3rem .8rem;border-radius:2px;
}
.col-pill.pc{
  background:rgba(243,206,2,.15);color:var(--amarelo);
  border:1px solid rgba(243,206,2,.3);
}
.col-pill.op{
  background:rgba(255,255,255,.06);color:rgba(238,238,238,.80);
  border:1px solid rgba(255,255,255,.22);
}
.col-title{
  font-family:"Pressio","Arial Narrow",Arial,sans-serif;
  font-size:2.2rem;letter-spacing:.1em;text-transform:uppercase;
  color:var(--branco);
}
.col-desc{
  font-size:.85rem;color:rgba(238,238,238,.75);
  margin-left:auto;
}

/* ── CARDS ── */
.cards{display:flex;flex-direction:column;gap:0;}

.card{
  position:relative;
  background:var(--cinza-card);
  padding:1.25rem 1.25rem 1rem;
  text-decoration:none;color:inherit;
  display:flex;flex-direction:column;gap:.35rem;
  border-bottom:1px solid rgba(255,255,255,.05);
  transition:background .15s;
  overflow:hidden;
  min-height:110px;
}
.card:last-child{border-bottom:none;}
.card::before{
  content:"";
  position:absolute;left:0;top:0;bottom:0;
  width:3px;background:var(--accent,var(--verde));
  transition:width .18s;
}
.card:hover{background:rgba(255,255,255,.055);}
.card:hover::before{width:5px;}

.card-cat{
  font-family:"Pressio","Arial Narrow",Arial,sans-serif;
  font-size:.78rem;letter-spacing:.18em;text-transform:uppercase;
  color:var(--accent,var(--verde));font-weight:500;
}
.card-title{
  font-family:"Pressio","Arial Narrow",Arial,sans-serif;
  font-size:1.4rem;font-weight:900;
  text-transform:uppercase;line-height:1.06;
  color:var(--branco);
}
.card-foot{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:auto;padding-top:.6rem;
  border-top:1px solid rgba(255,255,255,.06);
}
.card-file{
  font-size:.75rem;color:rgba(238,238,238,.60);
  font-family:"Courier New",monospace;
  word-break:break-all;
}
.card-arrow{
  color:var(--accent,var(--verde));
  opacity:0;transform:translateX(-4px);
  transition:opacity .15s,transform .15s;
  font-size:1rem;flex-shrink:0;margin-left:.5rem;
}
.card:hover .card-arrow{opacity:1;transform:translateX(0);}

/* ── EMPTY / LOADING ── */
.empty{
  padding:2rem 1.25rem;
  font-size:.8rem;font-style:italic;
  color:rgba(238,238,238,.2);
  border-bottom:none;
  min-height:80px;display:flex;align-items:center;
}
.loading-block{
  padding:3rem;text-align:center;
  color:rgba(238,238,238,.3);font-size:.85rem;
}
.spinner{
  width:24px;height:24px;
  border:2px solid rgba(66,206,2,.18);
  border-top-color:var(--verde);
  border-radius:50%;
  animation:spin .8s linear infinite;
  margin:0 auto .75rem;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── LEGEND ── */
.legend{
  display:flex;gap:1.25rem;flex-wrap:wrap;
  padding:.6rem 1.25rem;
  background:rgba(0,0,0,.1);
  border-top:1px solid rgba(255,255,255,.06);
}
.legend-item{display:flex;align-items:center;gap:.4rem;font-size:.75rem;color:rgba(238,238,238,.80);}
.legend-dot{width:8px;height:8px;border-radius:50%;}

/* ── FOOTER ── */
footer{
  position:relative;z-index:10;
  max-width:1100px;margin:0 auto;
  padding:1.25rem 2.5rem 2.5rem;
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:.75rem;
  border-top:1px solid rgba(255,255,255,.07);
  font-size:.7rem;color:rgba(238,238,238,.25);
}
footer a{color:var(--verde);text-decoration:none;}
footer a:hover{text-decoration:underline;}
.dots{display:flex;gap:5px;align-items:center;}
.dot{width:7px;height:7px;border-radius:50%;}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.card{animation:fadeUp .35s ease both;}

@media(max-width:560px){
  header,.search-wrap,.main,footer{padding-left:1rem;padding-right:1rem;}
  .logo-img{height:56px;}
  .card-title{font-size:1.1rem;}
}
</style>
</head>

<script>
/* ─────────────────────────────────────────────
   CONFIG
───────────────────────────────────────────── */
var REPO  = "atuono-tech/Meninas-em-Campo";
var BASE  = "https://atuono-tech.github.io/Meninas-em-Campo/";
var API   = "https://api.github.com/repos/" + REPO + "/contents/";

/* ─────────────────────────────────────────────
   CLASSIFICAÇÃO
   Retorna { year, col, accent, cat, label }
───────────────────────────────────────────── */
function classify(name) {
  var n = name.toLowerCase();

  /* ANO */
  var year = "2026";
  if (n.indexOf("2025") >= 0) year = "2025";
  else if (n.indexOf("ciclo1") >= 0 || n.indexOf("ciclo 1") >= 0 || n.indexOf("_ciclo1") >= 0) year = "2025";
  else if (n.indexOf("ciclo2") >= 0 || n.indexOf("ciclo 2") >= 0 || n.indexOf("_ciclo 2") >= 0) year = "2026";

  /* COLUNA: "pc" (prestação de contas) ou "op" (operacional) */
  var isPC =
    n.indexOf("lie") >= 0 ||
    n.indexOf("lei de incentivo") >= 0 ||
    n.indexOf("ciclo") >= 0 ||
    n.indexOf("prestacao") >= 0 ||
    n.indexOf("prestação") >= 0 ||
    n.indexOf("execucao") >= 0 ||
    n.indexOf("fomento") >= 0 ||
    n.indexOf("orcamento") >= 0;

  /* COR DE DESTAQUE */
  var accent = "#42ce02"; // verde (padrão operacional)
  if (isPC) {
    accent = "#f3ce02"; // amarelo = PC
  } else if (n.indexOf("impacto") >= 0 || n.indexOf("relatorio") >= 0 || n.indexOf("relatório") >= 0) {
    accent = "#f44c06"; // laranja = relatório de impacto
  } else if (n.indexOf("atividade") >= 0 || n.indexOf("descri") >= 0) {
    accent = "#c084fc"; // roxo claro = atividades (contraste adequado sobre azul)
  } else if (n.indexOf("dashboard") >= 0 || n.indexOf("sub") >= 0 || n.indexOf("primeiro") >= 0) {
    accent = "#42ce02"; // verde = dashboard operacional
  }

  /* RÓTULO DE CATEGORIA */
  var cat = "Documento";
  if (isPC) {
    if (n.indexOf("ciclo 2") >= 0 || n.indexOf("ciclo2") >= 0 || n.indexOf("_ciclo 2") >= 0) cat = "LIE · Ciclo 2";
    else if (n.indexOf("ciclo1") >= 0 || n.indexOf("ciclo 1") >= 0 || n.indexOf("_ciclo1") >= 0) cat = "LIE · Ciclo 1";
    else if (n.indexOf("lie") >= 0 || n.indexOf("lei de incentivo") >= 0) cat = "LIE";
    else cat = "Prestação de Contas";
  } else if (n.indexOf("impacto") >= 0) {
    cat = "Relatório de Impacto";
  } else if (n.indexOf("atividade") >= 0 || n.indexOf("descri") >= 0) {
    cat = "Descrição de Atividades";
  } else if (n.indexOf("primeiro") >= 0 && n.indexOf("tempo") >= 0) {
    cat = "Programa Primeiro Tempo";
  } else if (n.indexOf("dashboard") >= 0) {
    cat = "Dashboard";
  }

  return { year:year, col:isPC?"pc":"op", accent:accent, cat:cat };
}

/* ─────────────────────────────────────────────
   TÍTULO LEGÍVEL
───────────────────────────────────────────── */
function prettify(name) {
  return name
    .replace(/\.html$/i, "")
    .replace(/[-_]/g, " ")
    .replace(/(\w)/g, function(c){ return c.toUpperCase(); })
    .trim();
}

/* ─────────────────────────────────────────────
   ESTADO
───────────────────────────────────────────── */
var allFiles = [];
var q = "";

/* ─────────────────────────────────────────────
   RENDER
───────────────────────────────────────────── */
function makeCard(f, idx) {
  var info = classify(f.name);
  var url  = BASE + encodeURIComponent(f.name);
  var delay = (idx * 0.045) + "s";
  return (
    '<a class="card" href="' + url + '"' +
    ' style="--accent:' + info.accent + ';animation-delay:' + delay + '">' +
      '<div class="card-cat">' + info.cat + '</div>' +
      '<div class="card-title">' + prettify(f.name) + '</div>' +
      '<div class="card-foot">' +
        '<span class="card-file">' + f.name + '</span>' +
        '<span class="card-arrow">→</span>' +
      '</div>' +
    '</a>'
  );
}

function makeChip(f, idx) {
  var info = classify(f.name);
  var url  = BASE + encodeURIComponent(f.name);
  var delay = (idx * 0.045) + "s";
  return (
    '<a class="chip" href="' + url + '"' +
    ' style="--chip-accent:' + info.accent + ';animation-delay:' + delay + '">' +
      '<div class="chip-cat">' + info.cat + '</div>' +
      '<div class="chip-label">' + prettify(f.name) + '</div>' +
    '</a>'
  );
}

/* Coluna institucional (PC ou OP sem turmas) */
function makeCol(files, colKey, yearKey, idx0) {
  var filtered = files.filter(function(f){
    var info = classify(f.name);
    return info.col === colKey && info.year === yearKey && !isTurma(f.name, yearKey);
  });

  var isPc = colKey === "pc";
  var colTitle = isPc ? "Prestação de Contas - LIE" : "Relatorio de Atividades e Impacto";
  var pillCls  = isPc ? "pc" : "op";
  var colDesc  = isPc ? "LIE · Captação" : "Institucional";
  var innerHtml = filtered.length
    ? '<div class="cards">' + filtered.map(function(f, i){ return makeCard(f, idx0 + i); }).join("") + '</div>'
    : '<div class="empty card" style="animation:none">Nenhum arquivo nesta categoria.</div>';

  return (
    '<div class="col">' +
      '<div class="col-header">' +
        '<span class="col-title">' + colTitle + '</span>' +
        '<span class="col-desc">' + colDesc + '</span>' +
      '</div>' +
      innerHtml +
    '</div>'
  );
}

/* Seção de turmas (só aparece em 2026 com dashboards de turma) */
function isTurma(name, yearKey) {
  if (yearKey !== "2026") return false;
  var n = name.toLowerCase();
  return (n.indexOf("sub") >= 0 || (n.indexOf("primeiro") >= 0 && n.indexOf("tempo") >= 0));
}

function makeTurmasSection(files, yearKey, idx0) {
  var turmas = files.filter(function(f){ return isTurma(f.name, yearKey); });
  if (!turmas.length) return "";

  return (
    '<div class="turmas-section">' +
      '<div class="turmas-header">' +
        '<span class="col-title">Acompanhamento Mensal das Turmas</span>' +
        '<span class="col-desc">' + turmas.length + ' turma' + (turmas.length !== 1 ? 's' : '') + '</span>' +
      '</div>' +
      '<div class="turmas-grid">' +
        turmas.map(function(f, i){ return makeChip(f, idx0 + i); }).join("") +
      '</div>' +
    '</div>'
  );
}

function render() {
  var lq = q.toLowerCase();
  var filtered = allFiles.filter(function(f){
    return !lq
      || f.name.toLowerCase().indexOf(lq) >= 0
      || prettify(f.name).toLowerCase().indexOf(lq) >= 0;
  });

  document.getElementById("total-count").textContent =
    filtered.length + " arquivo" + (filtered.length !== 1 ? "s" : "");

  var years = ["2026","2025"].filter(function(yr){
    return filtered.some(function(f){ return classify(f.name).year === yr; });
  });

  if (!filtered.length) {
    document.getElementById("main").innerHTML =
      '<div class="loading-block">Nenhum documento encontrado para "<em>' + q + '</em>".</div>';
    return;
  }

  var html = "";
  var globalIdx = 0;

  years.forEach(function(yr){
    var yFiles  = filtered.filter(function(f){ return classify(f.name).year === yr; });
    var yCls    = yr === "2025" ? "y2025" : "y2026";
    var yCount  = yFiles.length + " arquivo" + (yFiles.length !== 1 ? "s" : "");
   var turmaCount = yFiles.filter(function(f){ return isTurma(f.name, yr); }).length;
   var opCount    = yFiles.filter(function(f){ return classify(f.name).col === "op" && !isTurma(f.name, yr); }).length;
   var pcCount    = yFiles.filter(function(f){ return classify(f.name).col === "pc" && !isTurma(f.name, yr); }).length;
    html +=
      '<div class="year-block">' +
        '<div class="year-header">' +
          '<span class="year-pill ' + yCls + '">' + yr + '</span>' +
          '<div class="year-line"></div>' +
          '<span class="year-count">' + yCount + '</span>' +
        '</div>' +
makeTurmasSection(yFiles, yr, globalIdx) +
           makeFotosSection(yr) +
           makeCol(yFiles, "op", yr, globalIdx + turmaCount) +
           makeCol(yFiles, "pc", yr, globalIdx + turmaCount + opCount) +
      '</div>';

    globalIdx += yFiles.length;
  });

  html +=
    '<div class="legend">' +
      '<div class="legend-item"><div class="legend-dot" style="background:#f3ce02"></div>Prestação de Contas / LIE</div>' +
      '<div class="legend-item"><div class="legend-dot" style="background:#f44c06"></div>Relatório de Impacto</div>' +
      '<div class="legend-item"><div class="legend-dot" style="background:#c084fc"></div>Atividades</div>' +
      '<div class="legend-item"><div class="legend-dot" style="background:#42ce02"></div>Dashboard de Turma</div>' +
    '</div>';

  document.getElementById("main").innerHTML = html;
}

function makeFotosSection(yearKey) {
  if (yearKey !== "2026") return "";

  return (
    '<div class="fotos-section">' +
      '<div class="fotos-header">' +
        '<span class="fotos-title">Fotos &amp; Vídeos · 2026</span>' +
      '</div>' +
      '<div class="foto-mes" style="grid-column:1/-1;padding:1rem 1.25rem;">' +
        '<a class="foto-link" href="fotos.html" style="font-size:1.44rem;">Ver todas as fotos 2026 →</a>' +
      '</div>' +
    '</div>'
  );
}


/* Lista hardcoded dos arquivos do repositório.
   Adicione novos arquivos aqui quando subir ao GitHub. */
var REPO_FILES = [
  "Atividades em 2025.html",
  "Atividades em 2026.html",
  "Impacto em 2025.html",
  "Lei de Incentivo ao Esporte _Ciclo 2.html",
  "Lei de Incentivo ao Esporte _Ciclo1.html",
  "Memoria_do_Mes_2026.html",
  "Primeiro Tempo.html",
  "Sub11.html",
  "Sub13 M.html",
  "Sub13 T.html",
  "Sub15 T.html",
  "Sub15 T2.html",
  "Sub17 M.html",
  "Sub17 T.html",
  "Sub17 T2.html"
];

function load() {
  allFiles = REPO_FILES
    .map(function(name){ return { name: name }; })
    .sort(function(a,b){ return a.name.localeCompare(b.name); });

  if (!allFiles.length) {
    document.getElementById("main").innerHTML =
      '<div class="loading-block">Nenhum arquivo .html encontrado.</div>';
    return;
  }
  render();
}

/* ─────────────────────────────────────────────
   EVENTOS
───────────────────────────────────────────── */
document.getElementById("q").addEventListener("input", function(e){
  q = e.target.value;
  render();
});

load();
</script>
