<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fotos · Maio 2026 · Meninas em Campo</title>
  <style>
    :root{--azul:#354d73;--azul2:#2a3d5c;--verde:#4caf50;--bg:#f4f6f9;--card:#fff;--muted:#6b7a99;--radius:10px;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:"Segoe UI",Arial,sans-serif;background:var(--bg);color:#1a2540;}
    header{background:var(--azul);color:#fff;padding:28px 32px 22px;display:flex;align-items:center;gap:18px;}
    .back{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:8px;padding:7px 14px;cursor:pointer;font-size:14px;text-decoration:none;}
    .back:hover{background:rgba(255,255,255,.28);}
    .htitle h1{font-size:1.5rem;font-weight:700;}
    .htitle p{font-size:.9rem;opacity:.8;margin-top:3px;}
    .badge{margin-left:auto;background:var(--verde);color:#fff;border-radius:20px;padding:5px 16px;font-size:.85rem;font-weight:600;}
    main{max-width:1100px;margin:0 auto;padding:32px 20px;}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;}
    .item{background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.10);cursor:pointer;transition:transform .18s,box-shadow .18s;}
    .item:hover{transform:translateY(-3px);box-shadow:0 4px 14px rgba(53,77,115,.2);}
    .item img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;}
    .item .cap{padding:7px 10px;font-size:.78rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .msg{text-align:center;padding:60px 20px;color:var(--muted);font-size:1rem;}
    #lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:1000;align-items:center;justify-content:center;flex-direction:column;}
    #lb.open{display:flex;}
    #lb img{max-width:92vw;max-height:80vh;border-radius:8px;}
    #lb-cap{color:#fff;margin-top:14px;font-size:.88rem;opacity:.75;}
    #lb-x{position:absolute;top:18px;right:24px;background:none;border:none;color:#fff;font-size:30px;cursor:pointer;}
    #lb-p,#lb-n{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);border:none;color:#fff;font-size:28px;padding:10px 16px;border-radius:8px;cursor:pointer;}
    #lb-p{left:16px;}#lb-n{right:16px;}
    footer{text-align:center;padding:24px;font-size:.8rem;color:var(--muted);border-top:1px solid #dde3ed;margin-top:20px;}
  </style>
</head>
<body>
<header>
  <a class="back" href="index.html">← Voltar</a>
  <div class="htitle">
    <h1>Registros · Maio 2026</h1>
  </div>
  <span class="badge" id="badge">carregando…</span>
</header>
<main id="main"><div class="msg">⏳ Carregando fotos…</div></main>
<div id="lb">
  <button id="lb-x">✕</button>
  <button id="lb-p">‹</button>
  <img id="lb-img" src="" alt=""/>
  <div id="lb-cap"></div>
  <button id="lb-n">›</button>
</div>
<footer>Meninas em Campo © 2026 · Projeto Social de Futebol Feminino</footer>
<script>
var OWNER="atuono-tech",REPO="Meninas-em-Campo",BRANCH="main";
var PASTA="fotos/2026/maio";
var photos=[],idx=0;
var EXT=/\.(jpe?g|png|webp|gif|avif)$/i;
function raw(p){return"https://raw.githubusercontent.com/"+OWNER+"/"+REPO+"/"+BRANCH+"/"+p;}
function load(){
  fetch("https://api.github.com/repos/"+OWNER+"/"+REPO+"/contents/"+PASTA+"?ref="+BRANCH)
  .then(function(r){return r.ok?r.json():[];})
  .catch(function(){return[];})
  .then(function(items){
    var m=document.getElementById("main");
    if(!Array.isArray(items)||items.length===0){
      m.innerHTML="<div class=msg>📂 Nenhuma foto ainda.<br><small>Envie fotos JPG para <code>"+PASTA+"/</code> no GitHub.</small></div>";
      document.getElementById("badge").textContent="0 fotos";return;
    }
    photos=items.filter(function(f){return f.type==="file"&&EXT.test(f.name);})
      .map(function(f){return{url:raw(f.path),name:f.name};});
    document.getElementById("badge").textContent=photos.length+" foto"+(photos.length!==1?"s":"");
    var g=document.createElement("div");g.className="grid";
    photos.forEach(function(p,i){
      var el=document.createElement("div");el.className="item";el.dataset.i=i;
      el.innerHTML='<img src="'+p.url+'" alt="'+p.name+'" loading="lazy"/><div class="cap">'+p.name+'</div>';
      el.addEventListener("click",function(){open(parseInt(this.dataset.i));});
      g.appendChild(el);
    });
    m.innerHTML="";m.appendChild(g);
  });
}
function open(i){idx=i;show();document.getElementById("lb").classList.add("open");}
function show(){var p=photos[idx];document.getElementById("lb-img").src=p.url;document.getElementById("lb-cap").textContent=p.name;}
document.getElementById("lb-x").onclick=function(){document.getElementById("lb").classList.remove("open");};
document.getElementById("lb-p").onclick=function(){idx=(idx-1+photos.length)%photos.length;show();};
document.getElementById("lb-n").onclick=function(){idx=(idx+1)%photos.length;show();};
document.addEventListener("keydown",function(e){
  var lb=document.getElementById("lb");if(!lb.classList.contains("open"))return;
  if(e.key==="ArrowLeft"){idx=(idx-1+photos.length)%photos.length;show();}
  if(e.key==="ArrowRight"){idx=(idx+1)%photos.length;show();}
  if(e.key==="Escape")lb.classList.remove("open");
});
document.getElementById("lb").addEventListener("click",function(e){if(e.target===this)this.classList.remove("open");});
load();
</script>
</body>
</html>
